spring:

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

    publisher-confirm-type: correlated

    listener:
      simple:
        acknowledge-mode: manual
        default-requeue-rejected: false